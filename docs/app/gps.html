<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Γ-Net GPS — Body Topology Diagnostic</title>
  <link rel="stylesheet" href="gps.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ -->
<!--  HEADER                                                 -->
<!-- ═══════════════════════════════════════════════════════ -->
<header class="top-bar">
  <div class="logo">Γ-Net <span class="accent">GPS</span></div>
  <div class="subtitle">人體拓撲定位系統 · 即時阻抗診斷 · 零參數物理</div>
  <a href="index.html" class="nav-link">← Health Check</a>
</header>

<!-- ═══════════════════════════════════════════════════════ -->
<!--  MAIN SPLIT LAYOUT                                      -->
<!-- ═══════════════════════════════════════════════════════ -->
<main class="split">

  <!-- ── LEFT: Body Topology ─────────────────────────── -->
  <section class="panel-body" id="panelBody">

    <!-- Health Score -->
    <div class="health-score" id="healthScore">
      <div class="h-label">HEALTH INDEX</div>
      <div class="h-value" id="hValue">H = —</div>
      <div class="h-sub" id="hSub">輸入數據後計算</div>
    </div>

    <!-- SVG Body -->
    <div class="body-container">
      <svg viewBox="0 0 480 720" id="bodySvg" class="body-svg">
        <defs>
          <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#66bb6a" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#66bb6a" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowYellow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffa726" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#ffa726" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ef5350" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- ── BODY SILHOUETTE ── -->
        <!-- Head -->
        <ellipse cx="240" cy="62" rx="28" ry="32"
                 fill="rgba(100,120,160,0.06)" stroke="rgba(100,120,160,0.2)" stroke-width="1.2"/>
        <!-- Neck -->
        <rect x="228" y="90" width="24" height="18" rx="4"
              fill="rgba(100,120,160,0.04)" stroke="rgba(100,120,160,0.15)" stroke-width="1"/>
        <!-- Torso -->
        <path d="M195,108 L170,130 L155,180 L150,260 L152,340 L160,400
                 L175,410 L200,415 L240,418 L280,415 L305,410 L320,400
                 L328,340 L330,260 L325,180 L310,130 L285,108 Z"
              fill="rgba(100,120,160,0.06)" stroke="rgba(100,120,160,0.2)" stroke-width="1.2"/>
        <!-- Left arm -->
        <path d="M170,130 L135,160 L115,220 L105,290 L100,330"
              fill="none" stroke="rgba(100,120,160,0.15)" stroke-width="8" stroke-linecap="round"/>
        <!-- Right arm -->
        <path d="M310,130 L345,160 L365,220 L375,290 L380,330"
              fill="none" stroke="rgba(100,120,160,0.15)" stroke-width="8" stroke-linecap="round"/>
        <!-- Left leg -->
        <path d="M190,410 L180,480 L175,560 L172,640 L168,690"
              fill="none" stroke="rgba(100,120,160,0.15)" stroke-width="10" stroke-linecap="round"/>
        <!-- Right leg -->
        <path d="M290,410 L300,480 L305,560 L308,640 L312,690"
              fill="none" stroke="rgba(100,120,160,0.15)" stroke-width="10" stroke-linecap="round"/>

        <!-- ── C3 TRUNK LINES ── -->
        <!-- Vascular (red, left of center) -->
        <path d="M235,95 L232,150 L228,250 L225,350 L222,420"
              stroke="#ef5350" stroke-width="2.5" fill="none" opacity="0.4"
              stroke-dasharray="6,3" class="trunk-line"/>
        <!-- Neural (blue, right of center) -->
        <path d="M245,95 L248,150 L252,250 L255,350 L258,420"
              stroke="#4fc3f7" stroke-width="2" fill="none" opacity="0.4"
              stroke-dasharray="5,5" class="trunk-line"/>

        <!-- ── ORGAN NODES (on body) ── -->
        <!-- Brain (C1) — special larger node -->
        <g class="organ-node" data-organ="brain" id="node-brain">
          <circle cx="240" cy="55" r="24" class="organ-glow"/>
          <circle cx="240" cy="55" r="12" class="organ-circle c1-ring"/>
          <text x="240" y="59" class="node-letter">C1</text>
        </g>

        <!-- Thyroid — neck -->
        <g class="organ-node" data-organ="thyroid" id="node-thyroid">
          <circle cx="240" cy="100" r="14" class="organ-glow"/>
          <circle cx="240" cy="100" r="7" class="organ-circle"/>
        </g>

        <!-- Heart (cardiac) — left chest -->
        <g class="organ-node" data-organ="cardiac" id="node-cardiac">
          <circle cx="215" cy="165" r="18" class="organ-glow"/>
          <circle cx="215" cy="165" r="9" class="organ-circle"/>
        </g>

        <!-- Lungs (pulmonary) — right chest -->
        <g class="organ-node" data-organ="pulmonary" id="node-pulmonary">
          <circle cx="270" cy="160" r="18" class="organ-glow"/>
          <circle cx="270" cy="160" r="9" class="organ-circle"/>
        </g>

        <!-- Vascular — along trunk -->
        <g class="organ-node" data-organ="vascular" id="node-vascular">
          <circle cx="230" cy="210" r="16" class="organ-glow"/>
          <circle cx="230" cy="210" r="8" class="organ-circle"/>
        </g>

        <!-- Liver (hepatic) — right upper abdomen -->
        <g class="organ-node" data-organ="hepatic" id="node-hepatic">
          <circle cx="275" cy="230" r="18" class="organ-glow"/>
          <circle cx="275" cy="230" r="9" class="organ-circle"/>
        </g>

        <!-- Endocrine — left upper abdomen -->
        <g class="organ-node" data-organ="endocrine" id="node-endocrine">
          <circle cx="205" cy="250" r="16" class="organ-glow"/>
          <circle cx="205" cy="250" r="8" class="organ-circle"/>
        </g>

        <!-- Kidneys (renal) — mid back -->
        <g class="organ-node" data-organ="renal" id="node-renal">
          <circle cx="270" cy="290" r="16" class="organ-glow"/>
          <circle cx="270" cy="290" r="8" class="organ-circle"/>
        </g>

        <!-- Immune — spleen area -->
        <g class="organ-node" data-organ="immune" id="node-immune">
          <circle cx="210" cy="300" r="16" class="organ-glow"/>
          <circle cx="210" cy="300" r="8" class="organ-circle"/>
        </g>

        <!-- GI (gastrointestinal) — lower abdomen -->
        <g class="organ-node" data-organ="gi" id="node-gi">
          <circle cx="240" cy="355" r="18" class="organ-glow"/>
          <circle cx="240" cy="355" r="9" class="organ-circle"/>
        </g>

        <!-- Autonomic — along spine -->
        <g class="organ-node" data-organ="autonomic" id="node-autonomic">
          <circle cx="240" cy="400" r="14" class="organ-glow"/>
          <circle cx="240" cy="400" r="7" class="organ-circle"/>
        </g>

        <!-- Musculoskeletal — leg area -->
        <g class="organ-node" data-organ="musculoskeletal" id="node-musculoskeletal">
          <circle cx="240" cy="450" r="16" class="organ-glow"/>
          <circle cx="240" cy="450" r="8" class="organ-circle"/>
        </g>

        <!-- ── SIDE LABELS + CONNECTOR LINES ── -->
        <!-- Left side labels -->
        <line x1="215" y1="165" x2="60" y2="148" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="55" y="143" class="side-label" text-anchor="end">心臟</text>
        <text x="55" y="156" class="side-gamma" text-anchor="end" id="g-cardiac"></text>

        <line x1="230" y1="210" x2="60" y2="200" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="55" y="195" class="side-label" text-anchor="end">血管 C3</text>
        <text x="55" y="208" class="side-gamma" text-anchor="end" id="g-vascular"></text>

        <line x1="205" y1="250" x2="60" y2="250" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="55" y="245" class="side-label" text-anchor="end">內分泌</text>
        <text x="55" y="258" class="side-gamma" text-anchor="end" id="g-endocrine"></text>

        <line x1="210" y1="300" x2="60" y2="300" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="55" y="295" class="side-label" text-anchor="end">免疫</text>
        <text x="55" y="308" class="side-gamma" text-anchor="end" id="g-immune"></text>

        <line x1="240" y1="400" x2="60" y2="400" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="55" y="395" class="side-label" text-anchor="end">自律神經</text>
        <text x="55" y="408" class="side-gamma" text-anchor="end" id="g-autonomic"></text>

        <!-- Right side labels -->
        <text x="240" y="28" class="side-label c1-label" text-anchor="middle">C1 大腦</text>
        <text x="240" y="40" class="side-gamma" text-anchor="middle" id="g-brain"></text>

        <line x1="240" y1="100" x2="420" y2="95" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="90" class="side-label">甲狀腺</text>
        <text x="425" y="103" class="side-gamma" id="g-thyroid"></text>

        <line x1="270" y1="160" x2="420" y2="148" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="143" class="side-label">肺</text>
        <text x="425" y="156" class="side-gamma" id="g-pulmonary"></text>

        <line x1="275" y1="230" x2="420" y2="225" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="220" class="side-label">肝臟</text>
        <text x="425" y="233" class="side-gamma" id="g-hepatic"></text>

        <line x1="270" y1="290" x2="420" y2="285" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="280" class="side-label">腎臟</text>
        <text x="425" y="293" class="side-gamma" id="g-renal"></text>

        <line x1="240" y1="355" x2="420" y2="348" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="343" class="side-label">消化</text>
        <text x="425" y="356" class="side-gamma" id="g-gi"></text>

        <line x1="240" y1="450" x2="420" y2="445" stroke="rgba(150,160,180,0.3)" stroke-width="0.8" stroke-dasharray="2,2"/>
        <text x="425" y="440" class="side-label">骨骼肌肉</text>
        <text x="425" y="453" class="side-gamma" id="g-musculoskeletal"></text>

        <!-- ── LEGEND ── -->
        <g transform="translate(10,650)">
          <rect x="0" y="0" width="460" height="24" rx="4"
                fill="rgba(20,22,30,0.6)" stroke="rgba(100,120,160,0.2)"/>
          <circle cx="20" cy="12" r="4" fill="#66bb6a"/>
          <text x="30" y="16" class="legend-text">健康 Γ²&lt;0.05</text>
          <circle cx="150" cy="12" r="4" fill="#ffa726"/>
          <text x="160" y="16" class="legend-text">注意 0.05–0.15</text>
          <circle cx="300" cy="12" r="4" fill="#ef5350"/>
          <text x="310" y="16" class="legend-text">警告 Γ²&gt;0.15</text>
          <text x="438" y="16" class="legend-text" text-anchor="end" fill="rgba(100,140,200,0.5)">C2</text>
        </g>
      </svg>
    </div>

    <!-- D_Z Forecast -->
    <div class="dz-forecast" id="dzForecast" style="display:none;">
      <h3>🔮 D<sub>Z</sub> 累積預測 — 誰先倒？</h3>
      <div id="dzBars"></div>
    </div>
  </section>

  <!-- ── RIGHT: Data Input ───────────────────────────── -->
  <section class="panel-input">
    <h2>📋 健檢數據輸入</h2>
    <p class="input-hint">輸入你的健檢數值，點擊「定位」即時更新左側人體拓撲</p>

    <div class="preset-row">
      <button class="btn-preset" onclick="loadPreset('healthy')">🟢 健康</button>
      <button class="btn-preset" onclick="loadPreset('metabolic')">🟡 代謝風險</button>
      <button class="btn-preset" onclick="loadPreset('kidney')">🔴 腎臟預警</button>
      <button class="btn-preset" onclick="loadPreset('smoker')">🚬 年輕吸菸</button>
      <button class="btn-preset small" onclick="clearAll()">清除</button>
    </div>

    <!-- Input Groups -->
    <div class="input-scroll">
      <fieldset class="field-group">
        <legend>👤 基本資料</legend>
        <div class="field-row">
          <label>年齡</label>
          <input type="number" id="in_age" min="18" max="100" placeholder="55">
        </div>
        <div class="field-row">
          <label>性別</label>
          <select id="in_sex">
            <option value="M">男</option>
            <option value="F">女</option>
          </select>
        </div>
        <div class="field-row">
          <label>腰圍 (cm)</label>
          <input type="number" id="in_waist" step="0.1" placeholder="88">
        </div>
      </fieldset>

      <fieldset class="field-group">
        <legend>💓 血壓</legend>
        <div class="field-row">
          <label>收縮壓 (mmHg)</label>
          <input type="number" id="in_sbp" placeholder="120">
        </div>
        <div class="field-row">
          <label>舒張壓 (mmHg)</label>
          <input type="number" id="in_dbp" placeholder="80">
        </div>
        <div class="field-row check">
          <input type="checkbox" id="in_bp_treated">
          <label for="in_bp_treated">服用降壓藥</label>
        </div>
        <div class="field-row check">
          <input type="checkbox" id="in_smoker">
          <label for="in_smoker">目前吸菸</label>
        </div>
      </fieldset>

      <fieldset class="field-group">
        <legend>🧪 血脂</legend>
        <div class="field-row">
          <label>總膽固醇 (mg/dL)</label>
          <input type="number" id="in_TC" step="0.1" placeholder="195">
        </div>
        <div class="field-row">
          <label>HDL (mg/dL)</label>
          <input type="number" id="in_HDL" step="0.1" placeholder="55">
        </div>
        <div class="field-row">
          <label>LDL (mg/dL)</label>
          <input type="number" id="in_LDL" step="0.1" placeholder="110">
        </div>
        <div class="field-row">
          <label>三酸甘油酯 (mg/dL)</label>
          <input type="number" id="in_TG" step="0.1" placeholder="120">
        </div>
      </fieldset>

      <fieldset class="field-group">
        <legend>🍬 代謝</legend>
        <div class="field-row">
          <label>空腹血糖 (mg/dL)</label>
          <input type="number" id="in_Glucose" step="0.1" placeholder="88">
        </div>
        <div class="field-row">
          <label>HbA1c (%)</label>
          <input type="number" id="in_HbA1c" step="0.1" placeholder="5.2">
        </div>
        <div class="field-row">
          <label>空腹胰島素 (μU/mL)</label>
          <input type="number" id="in_insulin" step="0.1" placeholder="6">
        </div>
      </fieldset>

      <fieldset class="field-group">
        <legend>🫘 腎 / 肝</legend>
        <div class="field-row">
          <label>肌酸酐 (mg/dL)</label>
          <input type="number" id="in_Cr" step="0.01" placeholder="0.9">
        </div>
        <div class="field-row">
          <label>BUN (mg/dL)</label>
          <input type="number" id="in_BUN" step="0.1" placeholder="14">
        </div>
        <div class="field-row">
          <label>AST (U/L)</label>
          <input type="number" id="in_AST" step="0.1" placeholder="22">
        </div>
        <div class="field-row">
          <label>ALT (U/L)</label>
          <input type="number" id="in_ALT" step="0.1" placeholder="25">
        </div>
        <div class="field-row">
          <label>白蛋白 (g/dL)</label>
          <input type="number" id="in_Albumin" step="0.1" placeholder="4.5">
        </div>
      </fieldset>

      <fieldset class="field-group">
        <legend>⚡ 電解質 / 血球</legend>
        <div class="field-row">
          <label>Na (mEq/L)</label>
          <input type="number" id="in_Na" step="0.1" placeholder="141">
        </div>
        <div class="field-row">
          <label>K (mEq/L)</label>
          <input type="number" id="in_K" step="0.1" placeholder="4.2">
        </div>
        <div class="field-row">
          <label>WBC (10³/μL)</label>
          <input type="number" id="in_WBC" step="0.1" placeholder="6.5">
        </div>
        <div class="field-row">
          <label>血紅素 (g/dL)</label>
          <input type="number" id="in_Hb" step="0.1" placeholder="15.0">
        </div>
        <div class="field-row">
          <label>血小板 (10³/μL)</label>
          <input type="number" id="in_Plt" step="1" placeholder="250">
        </div>
        <div class="field-row">
          <label>TSH (mIU/L)</label>
          <input type="number" id="in_TSH" step="0.01" placeholder="2.1">
        </div>
      </fieldset>
    </div>

    <button class="btn-compute" id="btnCompute" onclick="runCompute()" disabled>
      🛰️ 定位 — GPS Localize
    </button>

    <div class="disclaimer">
      ⚠️ 本頁結果僅作物理模型驗證參考，不構成任何醫療建議。請以正式醫療報告及專業醫師判斷為準。
    </div>
  </section>
</main>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div>正在載入物理引擎 (Pyodide)…</div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">×</button>
  <h3 id="detailTitle"></h3>
  <div id="detailContent"></div>
</div>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// Presets
// ═══════════════════════════════════════════════════════════
const PRESETS = {
  healthy: {
    age:55, sex:"M", waist:88, sbp:118, dbp:75, bp_treated:false, smoker:false,
    TC:195, HDL:55, LDL:110, TG:120, Glucose:88, HbA1c:5.2, insulin:6,
    Cr:0.9, BUN:14, AST:22, ALT:25, Albumin:4.5,
    Na:141, K:4.2, WBC:6.5, Hb:15.0, Plt:250, TSH:2.1
  },
  metabolic: {
    age:55, sex:"M", waist:108, sbp:145, dbp:92, bp_treated:true, smoker:false,
    TC:242, HDL:36, LDL:165, TG:210, Glucose:118, HbA1c:6.8, insulin:18,
    Cr:1.1, BUN:18, AST:38, ALT:45, Albumin:4.0,
    Na:141, K:4.5, WBC:7.8, Hb:14.2, Plt:280, TSH:3.0
  },
  kidney: {
    age:62, sex:"F", waist:98, sbp:155, dbp:95, bp_treated:true, smoker:false,
    TC:228, HDL:38, LDL:152, TG:195, Glucose:125, HbA1c:7.2, insulin:22,
    Cr:1.8, BUN:32, AST:42, ALT:38, Albumin:3.4,
    Na:138, K:5.2, WBC:8.5, Hb:11.5, Plt:310, TSH:4.5
  },
  smoker: {
    age:32, sex:"M", waist:90, sbp:128, dbp:82, bp_treated:false, smoker:true,
    TC:215, HDL:42, LDL:140, TG:165, Glucose:95, HbA1c:5.5, insulin:8,
    Cr:0.95, BUN:15, AST:28, ALT:32, Albumin:4.3,
    Na:140, K:4.3, WBC:7.2, Hb:15.5, Plt:240, TSH:2.0
  }
};

const FIELD_MAP = {
  age:'in_age', sex:'in_sex', waist:'in_waist',
  sbp:'in_sbp', dbp:'in_dbp', bp_treated:'in_bp_treated', smoker:'in_smoker',
  TC:'in_TC', HDL:'in_HDL', LDL:'in_LDL', TG:'in_TG',
  Glucose:'in_Glucose', HbA1c:'in_HbA1c', insulin:'in_insulin',
  Cr:'in_Cr', BUN:'in_BUN', AST:'in_AST', ALT:'in_ALT', Albumin:'in_Albumin',
  Na:'in_Na', K:'in_K', WBC:'in_WBC', Hb:'in_Hb', Plt:'in_Plt', TSH:'in_TSH'
};

const ORGAN_NAMES = {
  brain: '大腦 (C1)',
  cardiac: '心臟',
  pulmonary: '肺',
  vascular: '血管',
  hepatic: '肝臟',
  renal: '腎臟',
  endocrine: '內分泌',
  gi: '消化系統',
  immune: '免疫',
  musculoskeletal: '骨骼肌肉',
  autonomic: '自律神經',
  thyroid: '甲狀腺'
};

// ═══════════════════════════════════════════════════════════
// Input helpers
// ═══════════════════════════════════════════════════════════
function loadPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  for (const [k,v] of Object.entries(p)) {
    const el = document.getElementById(FIELD_MAP[k]);
    if (!el) continue;
    if (el.type === 'checkbox') el.checked = v;
    else if (el.tagName === 'SELECT') el.value = v;
    else el.value = v;
  }
  document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function clearAll() {
  for (const id of Object.values(FIELD_MAP)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (el.type === 'checkbox') el.checked = false;
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  }
  document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
  resetBody();
}

function gatherInput() {
  const data = {};
  const numFields = ['age','waist','sbp','dbp','TC','HDL','LDL','TG',
    'Glucose','HbA1c','insulin','Cr','BUN','AST','ALT','Albumin',
    'Na','K','WBC','Hb','Plt','TSH'];
  for (const f of numFields) {
    const el = document.getElementById(FIELD_MAP[f]);
    if (el && el.value !== '') data[f] = parseFloat(el.value);
  }
  data.sex = document.getElementById('in_sex').value;
  data.systolic_bp = data.sbp || 120;
  data.diastolic_bp = data.dbp || 80;
  data.bp_treated = document.getElementById('in_bp_treated').checked;
  data.smoker = document.getElementById('in_smoker').checked;
  if (data.waist) data.waist_cm = data.waist;
  return data;
}

function objFromMap(v) {
  if (v instanceof Map) return Object.fromEntries(v);
  if (v && typeof v.toJs === 'function') return v.toJs({dict_converter: Object.fromEntries});
  return v;
}

// ═══════════════════════════════════════════════════════════
// Pyodide
// ═══════════════════════════════════════════════════════════
let pyodide = null;

async function initPyodide() {
  pyodide = await loadPyodide();
  const resp = await fetch('gamma_compute.py');
  const code = await resp.text();
  pyodide.runPython(code);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('btnCompute').disabled = false;
}

initPyodide().catch(err => {
  document.getElementById('loading').innerHTML =
    '<span style="color:#ef5350;">載入失敗: ' + err.message + '</span>';
});

// ═══════════════════════════════════════════════════════════
// Compute & Update Body
// ═══════════════════════════════════════════════════════════
function runCompute() {
  const data = gatherInput();
  pyodide.globals.set('_input_data', pyodide.toPy(data));
  pyodide.runPython('_result = compute_all(dict(_input_data))');
  const result = pyodide.globals.get('_result').toJs({dict_converter: Object.fromEntries});

  updateBody(result);
  updateHealthScore(result);
  updateDZ(result);
}

function getColor(g2) {
  if (g2 > 0.15) return { fill: '#ef5350', glow: 'url(#glowRed)', cls: 'critical' };
  if (g2 > 0.05) return { fill: '#ffa726', glow: 'url(#glowYellow)', cls: 'warning' };
  return { fill: '#66bb6a', glow: 'url(#glowGreen)', cls: 'healthy' };
}

function updateBody(result) {
  const gamma = objFromMap(result.gamma);
  const organs = Object.keys(ORGAN_NAMES);

  for (const organ of organs) {
    const g = gamma[organ] || 0;
    const g2 = g * g;
    const color = getColor(g2);
    const node = document.getElementById('node-' + organ);
    if (!node) continue;

    // Update circle color
    const circle = node.querySelector('.organ-circle');
    if (circle) {
      circle.style.fill = color.fill;
      circle.style.stroke = color.fill;
    }

    // Update glow
    const glow = node.querySelector('.organ-glow');
    if (glow) {
      glow.setAttribute('fill', color.glow);
      glow.style.opacity = g2 > 0.05 ? '1' : '0.3';
    }

    // Update gamma text
    const gText = document.getElementById('g-' + organ);
    if (gText) {
      gText.textContent = 'Γ²=' + g2.toFixed(3);
      gText.style.fill = color.fill;
    }

    // Add animation class
    node.classList.remove('pulse-warn', 'pulse-crit');
    if (color.cls === 'critical') node.classList.add('pulse-crit');
    else if (color.cls === 'warning') node.classList.add('pulse-warn');

    // Click handler
    node.onclick = () => showDetail(organ, g, g2, result);
  }
}

function updateHealthScore(result) {
  const h = result.health_index;
  const g2 = result.total_gamma_squared;
  const el = document.getElementById('hValue');
  const sub = document.getElementById('hSub');
  const container = document.getElementById('healthScore');

  el.textContent = 'H = ' + h.toFixed(4);
  sub.textContent = (h * 100).toFixed(1) + '% 傳輸效率 · ΣΓ² = ' + g2.toFixed(4);

  container.classList.remove('score-good', 'score-warn', 'score-bad');
  if (h > 0.95) container.classList.add('score-good');
  else if (h > 0.85) container.classList.add('score-warn');
  else container.classList.add('score-bad');
}

function updateDZ(result) {
  const annual = result.dz_annual;
  const dzOrgans = objFromMap(result.dz_organs);
  const container = document.getElementById('dzForecast');
  const bars = document.getElementById('dzBars');
  container.style.display = 'block';

  const entries = Object.entries(dzOrgans).sort((a,b) => {
    const ao = objFromMap(a[1]), bo = objFromMap(b[1]);
    return (bo.share || 0) - (ao.share || 0);
  });

  let html = '<div class="dz-total">年度 D<sub>Z</sub> = ' + annual.toFixed(1) + ' 阻抗日</div>';
  for (const [organ, vals] of entries) {
    const v = objFromMap(vals);
    const pct = Math.min(v.share, 100);
    const color = pct > 25 ? '#ef5350' : (pct > 10 ? '#ffa726' : '#66bb6a');
    const name = ORGAN_NAMES[organ] || organ;
    html += '<div class="dz-bar-row">' +
      '<span class="dz-name">' + name + '</span>' +
      '<div class="dz-track"><div class="dz-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
      '<span class="dz-pct">' + v.share.toFixed(1) + '%</span></div>';
  }
  html += '<div class="dz-hint">⚠️ D<sub>Z</sub> 佔比最高的器官 = 物理預測最先惡化的器官</div>';
  bars.innerHTML = html;
}

function resetBody() {
  const organs = Object.keys(ORGAN_NAMES);
  for (const organ of organs) {
    const node = document.getElementById('node-' + organ);
    if (!node) continue;
    const circle = node.querySelector('.organ-circle');
    if (circle) { circle.style.fill = '#555'; circle.style.stroke = '#666'; }
    const glow = node.querySelector('.organ-glow');
    if (glow) { glow.setAttribute('fill', 'rgba(100,100,100,0.1)'); glow.style.opacity = '0.2'; }
    const gText = document.getElementById('g-' + organ);
    if (gText) { gText.textContent = ''; }
    node.classList.remove('pulse-warn', 'pulse-crit');
  }
  document.getElementById('hValue').textContent = 'H = —';
  document.getElementById('hSub').textContent = '輸入數據後計算';
  document.getElementById('healthScore').classList.remove('score-good', 'score-warn', 'score-bad');
  document.getElementById('dzForecast').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════
// Detail Panel
// ═══════════════════════════════════════════════════════════
function showDetail(organ, g, g2, result) {
  const panel = document.getElementById('detailPanel');
  const title = document.getElementById('detailTitle');
  const content = document.getElementById('detailContent');
  const name = ORGAN_NAMES[organ] || organ;
  const color = getColor(g2);

  title.innerHTML = '<span style="color:' + color.fill + '">●</span> ' + name;

  let html = '<div class="detail-grid">';
  html += '<div class="detail-item"><div class="detail-label">Γ</div><div class="detail-val">' + (g >= 0 ? '+' : '') + g.toFixed(4) + '</div></div>';
  html += '<div class="detail-item"><div class="detail-label">Γ²</div><div class="detail-val">' + g2.toFixed(4) + '</div></div>';
  html += '<div class="detail-item"><div class="detail-label">T = 1−Γ²</div><div class="detail-val">' + (1 - g2).toFixed(4) + '</div></div>';
  html += '<div class="detail-item"><div class="detail-label">狀態</div><div class="detail-val" style="color:' + color.fill + '">' +
    (color.cls === 'critical' ? '⚠️ 警告' : (color.cls === 'warning' ? '🟡 注意' : '✅ 健康')) + '</div></div>';
  html += '</div>';

  // DZ info
  if (result.dz_organs) {
    const dzOrgans = objFromMap(result.dz_organs);
    if (dzOrgans[organ]) {
      const dz = objFromMap(dzOrgans[organ]);
      html += '<div class="detail-dz">';
      html += '<div>日 D<sub>Z</sub>: ' + dz.g2.toFixed(4) + '</div>';
      html += '<div>年 D<sub>Z</sub>: ' + dz.annual.toFixed(1) + ' 阻抗日</div>';
      html += '<div>佔比: ' + dz.share.toFixed(1) + '%</div>';
      html += '</div>';
    }
  }

  // Physics note
  const notes = {
    brain: 'C1 節點：全身阻抗恆定控制器。穩態時冗餘，急性壓力下關鍵。',
    cardiac: '心臟 C2：Laplace-Starling 法則驅動的阻抗匹配器。',
    pulmonary: '肺 C2：氣道阻抗由 FEV1/FVC 決定。Γ²_pulm → CLRD AUC=0.83。',
    vascular: '血管 C3 trunk：Murray 法則 + Windkessel。脈壓 = Γ_vascular 的直接量測。',
    hepatic: '肝臟 C2：FIB-4 對應的纖維化阻抗。',
    renal: '腎臟 C2：eGFR = (1−Γ²_renal) 的臨床近似。',
    endocrine: '內分泌 C2：HOMA-IR = Γ²_endocrine 的受體漂移。AUC=0.81。',
    gi: '消化 C2：腸道適應法則（腸道可塑性）。',
    immune: '免疫 C2：WBC + 血小板阻抗匹配。',
    musculoskeletal: '骨骼 C2：Wolff 法則 + Davis 法則。',
    autonomic: '自律 C2：交感迷走重塑法則。',
    thyroid: '甲狀腺 C2：TSH 回饋迴路阻抗。'
  };
  html += '<div class="detail-note">' + (notes[organ] || '') + '</div>';

  content.innerHTML = html;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}
</script>
